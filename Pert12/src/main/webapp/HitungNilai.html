<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>Hitung Nilai</title>
    </head>
    <body>
        <h2>Form Input Nilai</h2>
        <form action="HitungNilai" method="post">
            <table>
                <tr>
                    <td>Jumlah hadir</td>
                    <td><input type="text" name="hadir"></td>
                </tr>
                <tr>
                    <td>Jumlah pertemuan</td>
                    <td><input type="text" name="pertemuan"></td>
                </tr>
                <tr>
                    <td>Nilai tugas</td>
                    <td><input type="text" name="tugas"></td>
                </tr>
                <tr>
                    <td>Nilai UTS</td>
                    <td><input type="text" name="uts"></td>
                </tr>
                <tr>
                    <td>Nilai UAS</td>
                    <td><input type="text" name="uas"></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Hitung">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
